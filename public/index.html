<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>AirDrop Empresa</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<header class="bg-black text-white p-4 flex items-center justify-between">

  <!-- IZQUIERDA (vacío para centrar) -->
  <div class="w-1/3"></div>

 <h1 class="flex flex-col items-center justify-center text-center font-bold">
  
  <img src="/logo.png" class="w-50 h-50 md:w-28 md:h-28 object-contain mb-4 animate-move">
  <span class="text-xl md:text-2xl">
    AirDrop Store
  </span>

</h1>

  <!-- DERECHA (MENÚ) -->
  <nav class="w-1/3 flex justify-end gap-4 text-sm">
    <button onclick="filter('all')" class="hover:text-green-400">Todo</button>
    <button onclick="filter('gorras')" class="hover:text-green-400">Gorras</button>
    <button onclick="filter('audifonos')" class="hover:text-green-400">Audífonos</button>
    <button onclick="filter('relojes')" class="hover:text-green-400">Relojes</button>
  </nav>

</header>

<main class="p-6">

<div id="admin" class="hidden mb-4">
<input id="name" placeholder="Nombre" class="border p-2">
<input id="price" type="number" placeholder="Precio" class="border p-2">
<input id="image" placeholder="Imagen URL" class="border p-2">
<input id="category" placeholder="Categoria (gorras, audifonos, relojes)" class="border p-2">
<button onclick="addProduct()" class="bg-black text-white px-2 py-1">Agregar</button>
</div>

<div id="products" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>

</main>

<script>
let token = localStorage.getItem('token');
let currentFilter = 'all';
let clicks = 0;

function secretLogin() {
  clicks++;

  if (clicks === 4) {
    login(); // llama tu login normal
    clicks = 0; // reinicia
  }

  // opcional: reiniciar si tarda mucho
  setTimeout(() => {
    clicks = 0;
  }, 3000);
}

function filter(cat){
  currentFilter = cat;
  load();
}

// 🔐 LOGIN
async function login(){
 const user = prompt('Usuario');
 const pass = prompt('Contraseña');

 const res = await fetch('/api/login', {
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body: JSON.stringify({user, pass})
 });

 if(res.ok){
   const data = await res.json();
   localStorage.setItem('token', data.token);
token = data.token;
   document.getElementById('admin').classList.remove('hidden');
   alert('Modo admin activado');
 } else {
   alert('Credenciales incorrectas');
   load();
 }
}

// 📦 CARGAR PRODUCTOS
async function load(){
 const res = await fetch('/api/products');
 const data = await res.json();
 render(data);
}

// 🎨 MOSTRAR
function render(products){
 const c = document.getElementById('products');
 c.innerHTML = '';

 let filtered = products;

 if(currentFilter !== 'all'){
   filtered = products.filter(p => p.category === currentFilter);
 }

 filtered.forEach(p=>{
  c.innerHTML += `
  <div class="bg-white p-4 rounded shadow">
    <img src="${p.image}" class="h-40 w-full object-cover">
    <h3 class="font-bold">$${p.name || "Producto sin nombre"}</h3>
    <p>Q${p.price}</p>
    <p class="${p.stock?'text-green-600':'text-red-600'}">
      ${p.stock?'Disponible':'Agotado'}
    </p>

    <a href="https://wa.me/50244941796?text=Quiero_info_sobre_La Cap%20$${p.name || "Producto sin nombre"}" 
    class="bg-green-500 text-white block text-center mt-2">
    Comprar
    </a>

    ${token ? `
    <button onclick="del('${p._id}')" class="bg-red-500 text-white px-2 py-1 mt-2">Eliminar</button>
    <button onclick="stock('${p._id}')" class="bg-yellow-500 text-white px-2 py-1 mt-2">Stock</button>
    `:''}
  </div>`;
 });
}

// ➕ AGREGAR
async function addProduct(){
 await fetch('/api/products', {
  method:'POST',
  headers:{
    'Content-Type':'application/json',
    'Authorization':token
  },
  body: JSON.stringify({
    name: name.value,
    price: price.value,
    image: image.value,
    category: category.value,
    stock:true
  })
 });

 load();
}

// 🗑 ELIMINAR
async function del(id){
 await fetch('/api/products/'+id,{
  method:'DELETE',
  headers:{'Authorization':token}
 });
 load();
}

// 🔄 STOCK
async function stock(id){
 await fetch('/api/products/'+id,{
  method:'PUT',
  headers:{'Authorization':token}
 });
 load();
}

load();
</script>

</body>
</html>
